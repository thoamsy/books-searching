<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="28" fill="#f2e7d7"/>

  <!-- Soundbox base - tortoise shell shape -->
  <path d="M42 90 Q44 102, 64 106 Q84 102, 86 90 Q84 82, 64 80 Q44 82, 42 90Z"
        fill="#c96f45" opacity="0.15" stroke="#c96f45" stroke-width="2.5"/>
  <!-- Soundbox detail curves -->
  <path d="M52 88 Q64 84, 76 88" fill="none" stroke="#c96f45" stroke-width="1.5" opacity="0.5"/>
  <path d="M50 96 Q64 100, 78 96" fill="none" stroke="#c96f45" stroke-width="1.5" opacity="0.5"/>

  <!-- Arms - elegant S-curves -->
  <path d="M44 86 C40 70, 38 50, 44 36 Q48 28, 56 24"
        fill="none" stroke="#c96f45" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M84 86 C88 70, 90 50, 84 36 Q80 28, 72 24"
        fill="none" stroke="#c96f45" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Crossbar / yoke -->
  <path d="M56 24 C60 20, 68 20, 72 24" fill="none" stroke="#c96f45" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Decorative scrolls at arm tips -->
  <path d="M56 24 C54 22, 53 24, 54.5 25.5" fill="none" stroke="#c96f45" stroke-width="2" stroke-linecap="round"/>
  <path d="M72 24 C74 22, 75 24, 73.5 25.5" fill="none" stroke="#c96f45" stroke-width="2" stroke-linecap="round"/>

  <!-- Strings - 5 strings with subtle taper -->
  <line x1="53" y1="27" x2="50" y2="82" stroke="#35271f" stroke-width="1.2" opacity="0.7"/>
  <line x1="57.5" y1="24.5" x2="56" y2="81" stroke="#35271f" stroke-width="1.3" opacity="0.75"/>
  <line x1="64" y1="22" x2="64" y2="80" stroke="#35271f" stroke-width="1.4" opacity="0.8"/>
  <line x1="70.5" y1="24.5" x2="72" y2="81" stroke="#35271f" stroke-width="1.3" opacity="0.75"/>
  <line x1="75" y1="27" x2="78" y2="82" stroke="#35271f" stroke-width="1.2" opacity="0.7"/>

  <!-- Bridge on soundbox -->
  <path d="M49 83 Q64 79, 79 83" fill="none" stroke="#c96f45" stroke-width="2" stroke-linecap="round"/>

  <!-- Tailpiece knob -->
  <circle cx="64" cy="106" r="2" fill="#c96f45" opacity="0.6"/>

  <!-- Top ornament - small laurel bud -->
  <ellipse cx="64" cy="18" rx="2" ry="2.5" fill="#c96f45" opacity="0.45"/>
</svg>
